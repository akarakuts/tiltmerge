name: Build Android (Debug APK)

# Автосборка debug-APK на каждый push/PR. Требует Godot 4.7 + Android export templates.
# Ветка main → production; dev → experimental.

on:
  push:
    branches: [main, dev]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot 4.7
        uses: chickensoft-games/setup-godot@v1
        with:
          version: 4.7.1
          use-dotnet: false
          include-templates: true

      - name: Verify project imports (headless)
        run: godot --headless --import

      - name: Install gdtoolkit (lint)
        run: pip install gdtoolkit

      - name: Lint GDScript
        run: |
          echo "=== gdlint ==="
          find scripts tests -name '*.gd' -print0 | xargs -0 gdlint

      - name: Validate release configuration
        run: python3 scripts/validate_release.py

      - name: Run test suite in isolated save slots
        run: ./scripts/run_tests.sh

      - name: Verify translations (CSV well-formed, key parity)
        run: |
          python3 - <<'PY'
          import csv, sys
          files = ["translations/en.csv", "translations/ru.csv"]
          keys = {}
          for f in files:
            with open(f) as fh:
              rows = list(csv.reader(fh))
            if not rows or rows[0][0] != "key":
              print(f"❌ {f}: first cell must be 'key'"); sys.exit(1)
              continue
            ks = [r[0] for r in rows[1:]]
            keys[f] = set(ks)
            print(f"✓ {f}: {len(ks)} keys")
          if keys[files[0]] != keys[files[1]]:
            only_en = keys[files[0]] - keys[files[1]]
            only_ru = keys[files[1]] - keys[files[0]]
            if only_en: print(f"❌ Missing in ru: {only_en}")
            if only_ru: print(f"❌ Missing in en: {only_ru}")
            sys.exit(1)
          print("✓ Translation key parity OK")
          PY

      - name: Export Android Debug APK
        run: |
          mkdir -p build
          godot --headless --export-debug "Android Debug" build/tiltmerge-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: tiltmerge-debug-apk
          path: build/*.apk
          retention-days: 30
          if-no-files-found: warn

  release-on-tag:
    needs: build-android
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot 4.7
        uses: chickensoft-games/setup-godot@v1
        with:
          version: 4.7.1
          use-dotnet: false
          include-templates: true

      - name: Build signed Android App Bundle
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64" || { echo "Missing ANDROID_KEYSTORE_BASE64"; exit 1; }
          test -n "$ANDROID_KEYSTORE_PASSWORD" || { echo "Missing ANDROID_KEYSTORE_PASSWORD"; exit 1; }
          test -n "$ANDROID_KEY_ALIAS" || { echo "Missing ANDROID_KEY_ALIAS"; exit 1; }
          mkdir -p build
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/tiltmerge.keystore"
          export KEYSTORE_PATH="$RUNNER_TEMP/tiltmerge.keystore"
          python3 - <<'PY'
          import os
          from pathlib import Path

          path = Path("export_presets.cfg")
          text = path.read_text()
          marker = "[preset.1.options]"
          prefix, release_options = text.split(marker, 1)
          replacements = {
              'keystore/release=""': f'keystore/release="{os.environ["KEYSTORE_PATH"]}"',
              'keystore/release_user=""': f'keystore/release_user="{os.environ["ANDROID_KEY_ALIAS"]}"',
              'keystore/release_password=""': f'keystore/release_password="{os.environ["ANDROID_KEYSTORE_PASSWORD"]}"',
          }
          for old, new in replacements.items():
              if old not in release_options:
                  raise SystemExit(f"Expected empty setting not found: {old}")
              release_options = release_options.replace(old, new, 1)
          path.write_text(prefix + marker + release_options)
          PY
          godot --headless --export-release "Android Release" build/tiltmerge-release.aab

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/*.aab
          generate_release_notes: true
