name: Build Android (Debug APK)

# Автосборка debug-APK на каждый push/PR. Требует Godot 4.3 + Android export templates.
# Ветка main → production; dev → experimental.

on:
  push:
    branches: [main, dev]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot 4.3
        uses: chickensoft-games/setup-godot@v1
        with:
          version: 4.3.0
          use-dotnet: false
          include-templates: true

      - name: Verify project imports (headless)
        run: godot --headless --import

      - name: Install gdtoolkit (lint)
        run: pip install gdtoolkit

      - name: Lint GDScript
        run: |
          echo "=== gdlint ==="
          find scripts -name '*.gd' -print0 | xargs -0 gdlint || true

      - name: Run unit + smoke tests (scene-based)
        run: godot --headless tests/TestRunner.tscn

      - name: Run onboarding interactive test
        run: godot --headless tests/OnboardingTest.tscn

      - name: Run gameplay test (full loop simulation)
        run: godot --headless tests/GameplayTest.tscn

      - name: Verify translations (CSV well-formed, key parity)
        run: |
          python3 - <<'PY'
          import csv, sys
          files = ["translations/en.csv", "translations/ru.csv"]
          keys = {}
          for f in files:
            with open(f) as fh:
              rows = list(csv.reader(fh))
            if not rows or rows[0][0] != "key":
              print(f"❌ {f}: first cell must be 'key'"); sys.exit(1)
              continue
            ks = [r[0] for r in rows[1:]]
            keys[f] = set(ks)
            print(f"✓ {f}: {len(ks)} keys")
          if keys[files[0]] != keys[files[1]]:
            only_en = keys[files[0]] - keys[files[1]]
            only_ru = keys[files[1]] - keys[files[0]]
            if only_en: print(f"❌ Missing in ru: {only_en}")
            if only_ru: print(f"❌ Missing in en: {only_ru}")
            sys.exit(1)
          print("✓ Translation key parity OK")
          PY

      - name: Export Android Debug APK
        run: |
          mkdir -p build
          godot --headless --export-release "Android Debug" build/tiltmerge-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: tiltmerge-debug-apk
          path: build/*.apk
          retention-days: 30
          if-no-files-found: warn

  release-on-tag:
    needs: build-android
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: tiltmerge-debug-apk
          path: build/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/*.apk
          generate_release_notes: true
