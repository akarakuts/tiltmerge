name: Build Android (Debug APK)

# Автосборка debug-APK на каждый push/PR. Требует Godot 4.7 + Android export templates.
# Ветка main → production; dev → experimental.

on:
  push:
    branches: [main, dev]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Godot 4.7
        uses: chickensoft-games/setup-godot@f166999204a4f2722c6fe042fbaa3b3ea0d9c789 # v2.4.1
        with:
          version: 4.7.1
          use-dotnet: false
          include-templates: true
          cache: true

      - name: Verify project imports (headless)
        run: godot --headless --import

      - name: Install pinned development tools
        run: python3 -m pip install -r requirements-dev.txt

      - name: Run the quality gate
        run: ./scripts/check_quality.sh

      - name: Export Android Debug APK
        run: |
          mkdir -p build
          godot --headless --export-debug "Android Debug" build/tiltmerge-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: tiltmerge-debug-apk
          path: build/*.apk
          retention-days: 30
          if-no-files-found: warn

  release-on-tag:
    needs: build-android
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Check release signing secrets
        id: signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ] && [ -n "$ANDROID_KEYSTORE_PASSWORD" ] && [ -n "$ANDROID_KEY_ALIAS" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "Signing secrets not configured — skipping AAB export (debug APK still built)."
          fi

      - name: Setup Godot 4.7
        if: steps.signing.outputs.available == 'true'
        uses: chickensoft-games/setup-godot@f166999204a4f2722c6fe042fbaa3b3ea0d9c789 # v2.4.1
        with:
          version: 4.7.1
          use-dotnet: false
          include-templates: true
          cache: true

      - name: Setup JDK 17
        if: steps.signing.outputs.available == 'true'
        uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00 # v4.7.1
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        if: steps.signing.outputs.available == 'true'
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3.2.2

      - name: Build signed Android App Bundle
        if: steps.signing.outputs.available == 'true'
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          set -euo pipefail
          mkdir -p build
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/tiltmerge.keystore"
          export KEYSTORE_PATH="$RUNNER_TEMP/tiltmerge.keystore"

          # Android custom build template (required for AAB / gradle)
          TEMPLATE_DIR="${HOME}/.local/share/godot/export_templates/4.7.1.stable"
          SOURCE_ZIP="${TEMPLATE_DIR}/android_source.zip"
          test -f "$SOURCE_ZIP"
          rm -rf android/build
          mkdir -p android/build
          unzip -q -o "$SOURCE_ZIP" -d android/build
          if [[ ! -f android/build/build.gradle && ! -f android/build/build.gradle.kts ]]; then
            nested="$(find android/build -maxdepth 2 -name 'build.gradle*' | head -1 || true)"
            if [[ -n "$nested" ]]; then
              nested_dir="$(dirname "$nested")"
              shopt -s dotglob
              mv "$nested_dir"/* android/build/ 2>/dev/null || true
              shopt -u dotglob
            fi
          fi
          echo "4.7.1.stable" > android/.build_version

          python3 - <<'PY'
          import os
          import re
          from pathlib import Path

          path = Path("export_presets.cfg")
          text = path.read_text()
          marker = "[preset.1.options]"
          prefix, release_options = text.split(marker, 1)
          replacements = {
              'keystore/release=""': f'keystore/release="{os.environ["KEYSTORE_PATH"]}"',
              'keystore/release_user=""': f'keystore/release_user="{os.environ["ANDROID_KEY_ALIAS"]}"',
              'keystore/release_password=""': f'keystore/release_password="{os.environ["ANDROID_KEYSTORE_PASSWORD"]}"',
          }
          for old, new in replacements.items():
              if old not in release_options:
                  raise SystemExit(f"Expected empty setting not found: {old}")
              release_options = release_options.replace(old, new, 1)
          release_options = re.sub(
              r"gradle_build/export_format=\d+",
              "gradle_build/export_format=1",
              release_options,
              count=1,
          )
          release_options = release_options.replace(
              'gradle_build/gradle_build_path=""',
              'gradle_build/gradle_build_path="res://android/build"',
              1,
          )
          path.write_text(prefix + marker + release_options)
          PY

          godot --headless --import
          godot --headless --export-release "Android Release" build/tiltmerge-release.aab
          test -f build/tiltmerge-release.aab
          ls -lh build/tiltmerge-release.aab

      - name: Create GitHub Release
        uses: softprops/action-gh-release@6cbd405e2c4e67a21c47fa9e383d020e4e28b836 # v2.3.3
        with:
          files: build/*.aab
          fail_on_unmatched_files: false
          generate_release_notes: true
